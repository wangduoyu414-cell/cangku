run_manifest:
  agent_id: language-adapter-orchestration-evaluator
  goal: 围绕真实 replay（回放） 资产持续生成受控候选批次，并把结果接入下层 skill（技能） 校验主链。
  generation_guardrails:
    domain_statement: 所有候选必须首先服务于理解用户如何表达电脑组装与搭配清单需求，而不是替用户生成最终配置结论。
    scene_layers:
    - 需求表达场景
    - 清单理解场景
    - 约束冲突与歧义场景
    - 主备差异说明场景
    - 安全边界场景
    - 真实语言噪声场景
    forbidden_goal_swaps:
    - 最终配置推荐
    - 配件兼容性裁决
    - 方案排序
    - 购买动作建议
    - 上架/推送时机判断
    - 证据真值生成
    scene_coverage_rules:
      min_scene_layers_per_batch: 6
      min_persona_axes_per_batch: 4
      min_need_axes_per_batch: 6
      min_difficulty_axes_per_batch: 5
      max_single_scene_family_share: 0.35
  baseline_refs:
    replay_root: D:\diypc\assets\replay
    skill_root: D:\agent\skill\language-adapter-dataset-builder
    prompt_template_ref: D:\diypc\LLMceshi\llm-candidate-pack-prompt-template.md
    fill_template_ref: D:\diypc\LLMceshi\candidate-pack-fill-template.xlsx
    validate_candidate_pack_script: D:\agent\skill\language-adapter-dataset-builder\scripts\validate_candidate_pack.py
    formalize_script: D:\agent\skill\language-adapter-dataset-builder\scripts\formalize_validated_candidates.py
    qa_script: D:\agent\skill\language-adapter-dataset-builder\scripts\run_dataset_qa.py
  budget:
    total_candidate_goal: 60000
    batch_size: 1000
    pack_count: 60
  global_expected_mix: &id001
  - task_type: comparison_explanation
    candidate_type: hard_case
    count: 350
  - task_type: comparison_explanation
    candidate_type: ambiguous_sample
    count: 250
  - task_type: safety_refusal
    candidate_type: hard_case
    count: 200
  - task_type: safety_refusal
    candidate_type: redline_sample
    count: 150
  - task_type: supplemental_parse
    candidate_type: label_rule
    count: 50
  global_scene_pool:
    scene_families:
    - 01_mainline_gaming
    - 02_white_quiet_gaming
