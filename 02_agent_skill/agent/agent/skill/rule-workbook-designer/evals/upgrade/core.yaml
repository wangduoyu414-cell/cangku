suite_id: "rule-workbook-designer-upgrade-core"
baseline:
  previous_version: "pre-unified-2026-04-23"
  baseline_artifact: "evals/upgrade/frozen-baseline.md"
cases:
  - id: "keep-workbook-and-runtime-boundaries"
    goal: "升级统一结构后仍保留工作簿映射和运行时边界"
    before:
      - "旧版只有目标、输入、输出、脚本、红线"
    after:
      - "新版补齐设计目标、边界、不变量和正式评测资产"
    expected:
      - "仍显式绑定工作簿模板和导入目标"
      - "仍不允许 runtime 直接读 Excel"
      - "仍不扩展成正式规则执行器"
    notes: "验证结构迁移不破坏原有语义。"
