id: "generated-plan-example"
user_request: |
  请基于 D:\diypc 的规则维护模板和表格化改造方案，输出 task 02 的工作簿结构、导入目标和已发布规则包映射。
notes: "这是现有脚本生成后的目标输出形态示例，用于校准 rule_asset_plan 的完整结构。"
sample_output:
  rule_asset_plan:
    workbook_template_ref: 'D:\diypc\assets\templates\核心规则维护模板.xlsx'
    workbook_schema_ref: 'D:\diypc\assets\templates\core_rule_workbook_v1.json'
    workbook_tabs:
      - "00_填写说明"
      - "01_目标画像规则表"
      - "02_问题策略表"
      - "03_派生事实规则表"
      - "04_兼容关系规则表"
      - "05_硬约束求解规则表"
      - "06_优化指标规则表"
      - "07_证明与解释规则表"
      - "08_字段引用说明"
    workbook_constraints:
      - "schema_version（模式版本）: core_rule_workbook_v1"
      - "workbook_mode（工作簿模式）: strict"
      - "max_condition_depth（最大条件深度）: 3"
      - "max_rule_complexity（最大规则复杂度）: 8"
    draft_import_targets:
      - 'D:\diypc\python_tools\policy_importer'
    published_pack_targets:
      - 'D:\diypc\internal\rules\compiler'
      - "published rule package（已发布规则包）"
    current_runtime_coverage:
      - "action_rules（动作规则）: 6"
      - "push_rules（推送规则）: 1"
      - "templates（模板）: 7"
