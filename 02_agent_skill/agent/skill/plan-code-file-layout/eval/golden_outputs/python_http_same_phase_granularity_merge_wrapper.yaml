decision:
  strategy: merge
  target_area: "src/app/interfaces/refund_exports"
  repo_shape: layer-first
  artifact_type: service-endpoint
  stack: python
  files:
    - path: "src/app/interfaces/refund_exports/refund_export_controller.py"
      role: "controller"
      responsibility: "Own payload translation, use-case invocation, and response shaping for the refund export HTTP slice during the current rollout phase."
      reason: "The current-phase seam guidance wins here: the controller remains the active ingress seam, and the route wrapper should not survive as a second planning file unless it owns real framework glue."
  keep_inline:
    - "payload translation"
    - "response shaping"
  avoid:
    - "src/app/entrypoints/http/refund_export_routes.py"
    - "refund_export_service.py"
    - "schemas.py"
  why_not_fewer: "One controller file is already the smallest useful boundary for this same HTTP slice during the current rollout phase."
  why_not_more: "Keeping a thin route wrapper would add ceremony around the same ingress seam because refund_export_routes.py only forwards to the controller and does not own framework glue."
  risks:
    - "The finer-grained seam guidance wins for today's file plan, but the broader migration still points toward entrypoints/http as the eventual landing zone after cutover."
    - "If refund_export_routes.py starts owning real framework glue, request decoding, or framework-specific error handling, revisit whether the wrapper should remain."
    - "Once the rollout completes, the controller itself may still collapse or relocate as the long-term target takes over."
  confidence: medium
