      role: "command"
      responsibility: "Own argparse handling, the visible command flow, the tiny backlog fetch helper, and summary printing in one place."
      reason: "The current helper is a single-command helper and pass-through file that only serves this same command."
  keep_inline:
    - "argparse options for this command."
    - "The tiny backlog fetch helper."
    - "The summary formatter."
  avoid:
    - "refund_backlog_client.py"
    - "models.py"
    - "command_base.py"
  why_not_fewer: "One command file is already the smallest useful boundary for this backlog script."
