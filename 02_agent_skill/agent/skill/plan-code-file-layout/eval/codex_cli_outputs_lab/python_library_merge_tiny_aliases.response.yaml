  keep_inline:
    - "Keep the ALIASES and DISPLAY_LABELS mappings in hold_reason_labels.py."
    - "Keep canonicalize_hold_reason in the same hold reason file unless a second independent consumer appears."
    - "Keep CSV field ordering and split/join logic inside partner_export_csv.py rather than extracting parser or formatter helpers."
