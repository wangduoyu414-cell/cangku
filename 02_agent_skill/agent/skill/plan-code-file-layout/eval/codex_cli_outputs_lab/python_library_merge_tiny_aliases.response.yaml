  why_not_more: "Do not keep aliases and labels in separate hold reason modules, and do not split the merged helper further. Those rules change together, are locally scoped, and extra files would only create thin wrappers and cross-file ping-pong."
  risks:
    - "If other code imports canonicalize_hold_reason directly from hold_reason_aliases.py, the merge will require import updates or a short compatibility shim."
    - "If hold reason canonicalization soon gains a second consumer with different output needs, a dedicated normalizer module could become justified later."
    - "The wider evaluation repository is mixed, so this recommendation follows the stronger local signal from the shared Python subtree and the nearby partner export example."
