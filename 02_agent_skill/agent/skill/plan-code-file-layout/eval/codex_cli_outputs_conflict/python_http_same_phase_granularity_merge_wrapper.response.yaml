decision:
  strategy: "merge"
  target_area: "src/app/interfaces/refund_exports"
  repo_shape: "layer-first"
  artifact_type: "service-endpoint"
  stack: "python"
  files:
    - path: "src/app/interfaces/refund_exports/refund_export_controller.py"
      role: "controller"
      responsibility: "Own the current refund export HTTP ingress seam by translating request payload fields, invoking the refund export use case, and shaping the response payload during the rollout phase."
      reason: "The current-phase docs keep ingress in src/app/interfaces/refund_exports, and the existing route file contributes no real framework glue beyond a direct forward."
  keep_inline:
    - "Payload field extraction for export_id and requested_by inside refund_export_controller.py."
    - "Response dict shaping for status and export_id inside refund_export_controller.py."
  avoid:
    - "Keeping src/app/entrypoints/http/refund_export_routes.py as a forwarding-only wrapper during the current rollout."
    - "Adding a pass-through service or mapper file between the controller and the use case before a separate IO or contract boundary exists."
  why_not_fewer: "Collapsing this slice below one controller file would push payload translation and response shaping into the application use case or an off-scope route file, which would blur the documented Interfaces-to-Application seam and ignore the current migration rule that keeps ingress in src/app/interfaces/refund_exports."
  why_not_more: "Keeping or adding more files would add ceremony without clearer ownership because this slice has one change reason, one visible failure path, and no separate framework-specific behavior that deserves its own file yet."
  risks:
    - "docs/architecture/HTTP_TRANSPORT_TARGETS.md still sets src/app/entrypoints/http/refund_export_routes.py as the long-term target, so a later cutover will need an intentional move back into EntryPoints."
    - "If unseen HTTP registration code currently imports post_refund_export_route directly, merging away the wrapper will require updating that wiring at the same time even though the wrapper itself has no durable ownership value."
  confidence: "high"