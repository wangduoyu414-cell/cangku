decision:
  strategy: "split"
  target_area: "Refund sync slice currently rooted at src/app/services/legacy_refunds, with target-state ownership under src/app/{interfaces,application,infrastructure}/refunds per baseline docs"
  repo_shape: "layer-first"
  artifact_type: "service-endpoint"
  stack: "python"
  files:
    - path: "src/app/interfaces/refunds/refund_controller.py"
      role: "controller"
      responsibility: "Accept the sync trigger, perform only boundary-level input shaping, call the use case, and return the sync summary."
      reason: "This keeps request/response translation in Interfaces and matches the documented refunds module layout."
    - path: "src/app/application/refunds/sync_refunds_use_case.py"
      role: "use-case orchestration"
      responsibility: "Coordinate the refund sync flow, invoke the partner client and persistence adapter, enforce batch-level rules, and produce the synced/skipped result."
      reason: "The current slice needs one visible orchestration file once HTTP and database details are pushed out of the legacy service module."
    - path: "src/app/infrastructure/refunds/legacy_refund_client.py"
      role: "external adapter"
      responsibility: "Call the legacy partner pending-refunds endpoint, apply timeout and transport handling, and normalize partner payloads into records the use case can consume."
      reason: "Partner HTTP IO and payload drift are a distinct side-effect boundary from application orchestration and database writes."
    - path: "src/app/infrastructure/refunds/refund_sql_repository.py"
      role: "persistence adapter"
      responsibility: "Insert or upsert refund snapshots into SQLite, encapsulate SQL and idempotency behavior, and report storage outcomes needed by the use case."
      reason: "Database writes, conflict handling, and commit semantics are a separate failure boundary and should not stay mixed with partner-fetch logic."
  keep_inline:
    - "Keep the temporary refund payload record/dataclass inside legacy_refund_client.py until another consumer needs the same contract."
    - "Keep the synced/skipped result shape local to sync_refunds_use_case.py instead of creating a separate DTO file now."
    - "Keep one-off payload cleanup and Decimal normalization close to the client adapter unless a second ingestion path appears."
    - "Keep the single upsert statement local to refund_sql_repository.py rather than extracting SQL helpers."
  avoid:
    - "Do not keep src/app/services/legacy_refunds/refund_sync.py as the long-term owner of HTTP calls, validation, orchestration, and SQL together."
    - "Do not add a pass-through refund_sync_service.py between refund_controller.py and sync_refunds_use_case.py."
    - "Do not create shared/utils/common refund helper modules for one-off mapping or validation."
    - "Do not split tiny record types or mappers into standalone files before they have a second real consumer."
  why_not_fewer: "A smaller layout would still blur real boundaries: controller-triggered orchestration, partner HTTP access, and SQLite persistence would remain effectively coupled, which conflicts with the documented Clean Architecture target state and makes refund sync failures harder to trace."
  why_not_more: "More files would mostly add ceremony. This slice does not yet show a stable public API, a second consumer for payload contracts, or enough complexity to justify separate DTO, mapper, port, or wrapper files."
  risks:
    - "Baseline docs explicitly favor src/app/{interfaces,application,infrastructure}/refunds, so adopting this plan means migrating away from the existing src/app/services/legacy_refunds location and updating imports or callers."
    - "The repository docs are clear about layer ownership but less explicit about the exact infrastructure subfolder convention for refunds, so infrastructure/refunds is a best-fit target rather than a fully confirmed local pattern."
    - "It is unclear from the provided slice whether sync is only controller-triggered or also invoked by batch or ops tooling. If a scheduled or CLI entrypoint becomes first-class, add that entrypoint separately rather than stretching the controller."
    - "If an existing broader RefundRepository or refund domain model already exists outside the provided files, this slice should extend that contract instead of creating a parallel naming scheme."
  confidence: "medium"