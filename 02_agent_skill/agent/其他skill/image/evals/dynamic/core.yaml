suite_id: "gpt-image-2-prompt-structurer-dynamic-core"
cases:
  - id: "dynamic-single-image-text-control"
    source_example: "examples/core-example.yaml"
    reference_output: "examples/golden/core-example-golden.md"
    expected_output_shape: "single-image"
    required_sections:
      - "Web Prompt"
      - "Image Input Fields"
    required_request_signals:
      - "海报"
      - "主标题"
      - "不能出现别的文字"
    required_output_evidence:
      - "exact_text"
      - "晨烘限定"
      - "单一产地 / 浅烘 / 柑橘调"
    forbidden_output_tokens:
      - "Task Summary"
      - "Design Goal"
    notes: "验证标准单图文本控制场景默认进入模型可用输出。"
  - id: "dynamic-composite-role-separation"
    source_example: "examples/composite-example.yaml"
    reference_output: "examples/golden/composite-example-golden.md"
    expected_output_shape: "single-image"
    required_sections:
      - "Web Prompt"
      - "Image Input Fields"
    required_request_signals:
      - "图 1"
      - "图 2"
      - "图 3"
      - "多图合成"
    required_output_evidence:
      - "references"
      - "image 1: product_subject"
      - "image 2: background_scene"
      - "image 3: style_reference"
    forbidden_output_tokens:
      - "Task Summary"
      - "Design Goal"
    notes: "验证多图合成场景默认输出模型可用字段，并保留角色分工。"
  - id: "dynamic-sequence-platform-package"
    source_example: "examples/platform-sequence-example.yaml"
    reference_output: "examples/golden/platform-sequence-example-golden.md"
    expected_output_shape: "sequence"
    required_sections:
      - "Web Prompt"
      - "Image Input Fields"
    required_request_signals:
      - "6 页"
      - "封面"
      - "整组要统一"
    required_output_evidence:
      - "frame_count"
      - "feed stop"
      - "same rental desk space"
      - "Xiaohongshu"
    forbidden_output_tokens:
      - "Sequence Brief"
      - "Task Summary"
    notes: "验证多页图文请求默认进入模型可用序列输出。"
  - id: "dynamic-platform-cover-control"
    source_example: "examples/video-cover-example.yaml"
    reference_output: "examples/golden/video-cover-example-golden.md"
    expected_output_shape: "single-image"
    required_sections:
      - "Web Prompt"
      - "Image Input Fields"
    required_request_signals:
      - "Instagram reel 封面"
      - "缩略图"
      - "标题区要安全"
    required_output_evidence:
      - "safe_zone"
      - "thumbnail"
      - "vertical-safe-zone"
    forbidden_output_tokens:
      - "Task Summary"
      - "Design Goal"
    notes: "验证平台封面请求默认输出短格式模型可用结果。"
  - id: "dynamic-design-goal-brief-derivation"
    source_example: "examples/design-goal-brief-example.yaml"
    reference_output: "examples/golden/design-goal-brief-example-golden.md"
    expected_output_shape: "scenario-validation"
    required_sections:
      - "Recommended Route"
      - "Why This Route"
      - "Web Prompt"
      - "Image Input Fields"
    required_request_signals:
      - "只有一个设计目标"
      - "还没有拆场景"
      - "默认起点"
    required_output_evidence:
      - "product-hero-baseline"
      - "Ranked Order"
      - "Decision Evidence"
      - "scenario_ranking"
    forbidden_output_tokens:
      - "Task Summary"
      - "Sequence Brief"
    notes: "验证模糊设计目标会先派生场景，再返回推荐路线的模型可用结果。"
  - id: "dynamic-design-goal-scenario-validation"
    source_example: "examples/design-goal-scenario-validation-example.yaml"
    reference_output: "examples/golden/design-goal-scenario-validation-golden.md"
    expected_output_shape: "scenario-validation"
    required_sections:
      - "Recommended Route"
      - "Why This Route"
      - "Web Prompt"
      - "Image Input Fields"
    required_request_signals:
      - "字段补齐"
      - "3 个不同场景"
      - "默认起点"
    required_output_evidence:
      - "瓶身轮廓"
      - "标签文字"
      - "safe zone"
      - "Change Only"
      - "Ranked Order"
      - "Decision Evidence"
    forbidden_output_tokens:
      - "Task Summary"
      - "Sequence Brief"
    notes: "验证完整场景输入会进入推荐路线的模型可用输出，并保持关键比较证据。"
  - id: "dynamic-missing-exact-text"
    source_example: "examples/missing-exact-text-example.yaml"
    reference_output: "examples/golden/missing-exact-text-golden.md"
    expected_output_shape: "missing-fields"
    required_sections:
      - "Missing Fields"
      - "Why They Matter"
      - "Next Input Template"
    required_request_signals:
      - "还没确定最终文案"
      - "标题和副标题"
    required_output_evidence:
      - "exact_text"
      - "text hierarchy"
      - "rewrite allowance"
    forbidden_output_tokens:
      - "Web Prompt"
      - "Image Input Fields"
    notes: "验证缺少 exact_text 时进入缺失字段输出。"
  - id: "dynamic-missing-edit-boundary"
    source_example: "examples/missing-edit-boundary-example.yaml"
    reference_output: "examples/golden/missing-edit-boundary-golden.md"
    expected_output_shape: "missing-fields"
    required_sections:
      - "Missing Fields"
      - "Why They Matter"
      - "Next Input Template"
    required_request_signals:
      - "年份改掉"
      - "哪些元素必须完全不变"
      - "修改区域边界"
    required_output_evidence:
      - "edit_scope.change_only"
      - "edit_scope.preserve"
      - "source image"
    forbidden_output_tokens:
      - "Web Prompt"
      - "Image Input Fields"
    notes: "验证局部编辑边界不足时不会直接输出编辑提示词。"
  - id: "dynamic-expanded-single-image"
    source_example: "examples/expanded-single-image-example.yaml"
    reference_output: "examples/golden/expanded-single-image-example-golden.md"
    expected_output_shape: "expanded-single-image"
    required_sections:
      - "Task Summary"
      - "Main Prompt"
      - "Hard Constraint Block"
      - "Soft Preference Block"
      - "Parameter Suggestions"
      - "Risk Notes"
      - "Iteration Patches"
      - "Acceptance Checklist"
    required_request_signals:
      - "完整提示词包"
      - "风险"
      - "迭代补丁"
    required_output_evidence:
      - "Safe Zone"
      - "thumbnail"
      - "creator-native"
    forbidden_output_tokens:
      - "Web Prompt"
      - "Image Input Fields"
    notes: "验证显式要求完整包时会进入 expanded 单图输出。"
  - id: "dynamic-expanded-design-goal"
    source_example: "examples/expanded-design-goal-example.yaml"
    reference_output: "examples/golden/expanded-design-goal-example-golden.md"
    expected_output_shape: "expanded-scenario-validation"
    required_sections:
      - "Design Goal"
      - "Scenario Matrix"
      - "Scenario Samples"
      - "Cross-Check Findings"
      - "Recommended Baseline"
      - "Failure Risks"
      - "Next Patches"
      - "Acceptance Checklist"
    required_request_signals:
      - "完整的场景验证报告"
      - "排序依据"
      - "失败风险"
    required_output_evidence:
      - "Scenario Source"
      - "Ranked Order"
      - "Decision Evidence"
      - "product-hero-baseline"
    forbidden_output_tokens:
      - "Recommended Route"
      - "Web Prompt"
      - "Image Input Fields"
    notes: "验证显式要求完整报告时会进入 expanded 场景验证输出。"
